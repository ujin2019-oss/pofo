<!-- =========================================================
     공통 헤더 컴포넌트
     - 모든 페이지에서 동일하게 사용됩니다.
     - 메뉴를 추가/수정하려면 아래 <a> 항목만 고치면 됩니다.
     ========================================================= -->
<header class="header" id="header">
  <div class="container header__inner">
    <!-- 로고 (클릭 시 맨 위로) -->
    <a class="header__logo" href="#hero" aria-label="홈으로 이동">
      PORT<span class="header__logo-point">FOLIO</span>
    </a>

    <!-- 메인 메뉴 -->
    <nav class="header__nav" aria-label="주요 메뉴">
      <a class="header__link" href="#profile">PROFILE</a>
      <a class="header__link" href="#skills">SKILLS</a>
      <a class="header__link" href="#index">WORKS</a>
      <a class="header__link" href="#marketing">PROJECT</a>
    </nav>

    <!-- 모바일 햄버거 버튼 -->
    <button
      type="button"
      class="header__toggle"
      id="headerToggle"
      aria-label="메뉴 열기"
      aria-expanded="false"
      aria-controls="header"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
